  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../shared/Icons.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="TrustRow.jsx"></script>
  <script type="text/babel" src="QuickAccess.jsx"></script>
  <script type="text/babel" src="AIPrompt.jsx"></script>
  <script type="text/babel" src="BookingWidget.jsx"></script>
  <script type="text/babel" src="StickyOffer.jsx"></script>
  <script type="text/babel" src="AIDrawer.jsx"></script>

  <script type="text/babel">
    function App() {
      const [theme, setTheme] = React.useState('light');
      const [drawer, setDrawer] = React.useState(false);
      const [sticky, setSticky] = React.useState(true);
      const [confirmed, setConfirmed] = React.useState(false);

      React.useEffect(() => {
        document.documentElement.dataset.theme = theme;
      }, [theme]);

      return (
        <div className="ms-app">
          <Header
            theme={theme}
            onToggleTheme={() => setTheme((t) => t === 'dark' ? 'light' : 'dark')}
            onOpenAI={() => setDrawer(true)}
          />
          <Hero
            onPrimary={() => document.querySelector('.ms-bw').scrollIntoView({ behavior: 'smooth', block: 'center' })}
            onAskAI={() => setDrawer(true)}
          />
          <TrustRow />
          <QuickAccess onPick={() => document.querySelector('.ms-bw').scrollIntoView({ behavior: 'smooth' })} />
          <AIPrompt onAskAI={() => setDrawer(true)} />
          <BookingWidget onConfirm={() => setConfirmed(true)} onAskAI={() => setDrawer(true)} />

          {confirmed && (
            <div className="ms-toast">
              <Icon.Check width="16" height="16" /> Termin potvrđen za 14:00
            </div>
          )}

          <StickyOffer
            visible={sticky && !drawer}
            onDismiss={() => setSticky(false)}
            onBook={() => document.querySelector('.ms-bw').scrollIntoView({ behavior: 'smooth' })}
          />
          <AIDrawer open={drawer} onClose={() => setDrawer(false)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    .ms-toast {
      position: fixed; left: 50%; top: 22px; transform: translateX(-50%);
      background: #111114; color: #fff; padding: 12px 18px; border-radius: 14px;
      box-shadow: var(--shadow-lg); z-index: 80;
      display: inline-flex; align-items: center; gap: 8px;
      font: 600 13px var(--main-font);
    }
  </style>
</body>
</html>
